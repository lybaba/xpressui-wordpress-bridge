name: Build WordPress Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract plugin version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read xpressui version
        id: xpressui
        run: echo "version=$(cat .xpressui-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@lybaba"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch xpressui light runtime
        run: npm install @lybaba/xpressui@${{ steps.xpressui.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install runtime + apply WP.org patches
        run: python3 scripts/ci-install-runtime.py

      - name: Build plugin ZIP
        run: |
          ZIP_NAME="xpressui-bridge-${{ steps.version.outputs.version }}.zip"
          OUTPUT_PATH="$(bash scripts/build-package.sh "$ZIP_NAME")"
          cp "$OUTPUT_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
